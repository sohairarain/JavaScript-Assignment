<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="signup-card">
            <h2>Create Account</h2>
            <p>Join us today! It only takes a minute.</p>

            <div class="input-fields">
                <input type="text" id="user-name" placeholder="Full Name">
                <input type="email" id="user-email" placeholder="Email Address">
                <input type="password" id="user-pass" placeholder="Password">
            </div>

            <button class="signup-btn" onclick="registerUser()">Sign Up</button>

            <div class="footer-links">
                <p>Already have an account? <a target="_blank" href="./login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
